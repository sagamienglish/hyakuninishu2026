        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* アニメーション */
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.2s ease-out forwards; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            20% { transform: translateX(-4px) rotate(-2deg); }
            40% { transform: translateX(4px) rotate(2deg); }
            60% { transform: translateX(-4px) rotate(-2deg); }
            80% { transform: translateX(4px) rotate(2deg); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes vanish {
            0% { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        .animate-vanish { animation: vanish 0.6s ease-in forwards; pointer-events: none; }

        function formatRuby(text) {
            if (!text) return '';
            return text.replace(/\[([^:]+):([^\]]+)\]/g, '<ruby class="mx-[1px]">$1<rt class="text-[0.55em] text-stone-500 font-sans tracking-tighter leading-none">$2</rt></ruby>');

        // 時間文字列("MM:SS")を秒数に変換
        function parseTime(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.split(':');
            return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
        }

        // --- MP3が読み込めない場合のバックアップ（ブラウザの自動音声） ---
        function speakTextFallback(yomiText) {
            if (!('speechSynthesis' in window) || !yomiText) return;
            window.speechSynthesis.cancel();
            
            // スペースを読点（、）に変換して、適切なポーズ（間）を空けながら読ませる
            const naturalReading = yomiText.replace(/ /g, '、');
            
            const utterance = new SpeechSynthesisUtterance(naturalReading);
            utterance.lang = 'ja-JP';
            utterance.rate = 0.85; // 少しゆっくりめに設定
            window.speechSynthesis.speak(utterance);
        }

        // --- mp3再生用 ---
        let audioPlayer = null;

            }
        }

        function playAudioSegment(poemId, type) {
            initAudio();
            const poem = POEMS.find(p => p.id === poemId);
            if (!poem) return;

            // 前の音声を止める
            audioPlayer.pause();
            clearTimeout(playbackTimer);
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();

            const startTime = parseTime(type === 'kami' ? poem.kamiTime : poem.shimoTime);
            let duration = 0;

            if (type === 'kami') {
                duration = parseTime(poem.shimoTime) - startTime;
            } else {
                if (poemId < 100) {
                    const nextPoem = POEMS.find(p => p.id === poemId + 1);
                    duration = parseTime(nextPoem.kamiTime) - startTime;
                } else {
                    duration = 15;
                }
                // 途切れないよう、最大秒数の制限を延長
                if (duration > 20) duration = 20; 
            }

            audioPlayer.currentTime = startTime;
            
            // 再生を試みる。失敗した場合（ファイルが無い等）は合成音声に切り替える
            audioPlayer.play().then(() => {
                playbackTimer = setTimeout(() => {
                    audioPlayer.pause();
                }, duration * 1000);
            }).catch(e => {
                console.warn("MP3の再生に失敗しました。ブラウザの自動読み上げ機能を使用します。:", e);
                speakTextFallback(type === 'kami' ? poem.yomiKami : poem.yomiShimo);
            });
        }

        function stopAudio() {
            if (audioPlayer) audioPlayer.pause();
            clearTimeout(playbackTimer);
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();

                            <div class="karuta-card aspect-[2/3] relative cursor-pointer flex flex-col items-center justify-center p-2 text-center group" onclick="app.toggleLearnFlip(${poem.id})">
                                ${isMemorized ? '<div class="absolute top-1 right-1 text-emerald-600 text-lg z-10"><i class="fa-solid fa-check-circle bg-white rounded-full"></i></div>' : ''}
                                
                                ${!isFlipped ? `
                                    <p class="text-[10px] text-stone-400 font-sans absolute top-2 left-2 font-bold">${poem.id}</p>
                                    <p class="vertical-rl font-serif text-sm sm:text-base lg:text-lg leading-[2] tracking-[0.2em] text-stone-800 animate-pop">
                                        ${formatRuby(poem.kami)}
                                    </p>
                                ` : `
                                    <div class="flex flex-col h-full w-full justify-between animate-pop pt-1">
                                        <div class="flex flex-row-reverse justify-center gap-1 sm:gap-2 h-full overflow-hidden">
                                            <p class="vertical-rl font-serif text-[10px] sm:text-xs lg:text-sm leading-[1.3] tracking-[0.1em] text-stone-600">
                                                ${formatRuby(poem.kami)}
                                            </p>
                                            <p class="vertical-rl font-serif text-[10px] sm:text-xs lg:text-sm leading-[1.3] tracking-[0.1em] text-red-800 font-bold">
                                                ${formatRuby(poem.shimo)}
                                            </p>
                                        </div>
                                        <button onclick="event.stopPropagation(); app.toggleMemorized(${poem.id})" class="mt-1 w-full py-1.5 ${isMemorized ? 'bg-stone-200 text-stone-500' : 'bg-emerald-600 text-white'} rounded text-[10px] sm:text-xs font-bold shadow-sm active:scale-95 transition-colors shrink-0">
                                            ${isMemorized ? '外す' : '覚えた！'}
                                        </button>
                                    </div>
                                `}
                            </div>
                        `;
                    }).join('');

                    return `
                        <div class="flex-1 tatami-bg p-3 sm:p-4 overflow-y-auto">
                            <div class="max-w-6xl mx-auto">
                                <div class="bg-white/90 backdrop-blur-sm p-3 rounded shadow-sm mb-4 sticky top-0 z-20 border-l-4 border-stone-800 flex flex-col gap-3">
                                    <div class="flex justify-between items-center flex-wrap gap-2">
                                        <div class="flex items-center gap-2">
                                            <span class="font-bold text-stone-700 font-serif whitespace-nowrap">表示範囲</span>
                                            <span class="text-[10px] sm:text-xs font-bold text-emerald-700 bg-emerald-100 px-2 py-1 rounded-full whitespace-nowrap"><i class="fa-solid fa-hand-pointer"></i> 札をタップして裏返す</span>
                                        </div>
                                        <!-- ★ 練習モードへの直通ボタンを追加 -->
                                        <button onclick="app.startPracticeFromLearn()" class="px-3 py-1.5 bg-orange-600 text-white font-bold rounded text-xs sm:text-sm shadow-sm hover:bg-orange-700 transition-colors flex items-center gap-1 ml-auto">
                                            <i class="fa-solid fa-scroll"></i> この範囲を練習
                                        </button>
                                    </div>
                                    <div class="flex flex-wrap gap-1 sm:gap-2">
                                        ${rangeButtonsHTML}
                                    </div>
                                </div>
                                <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3 sm:gap-4 pb-10">
                                    ${cardsHTML}
                                </div>
                            </div>
                        </div>
                    `;
                },

                // ②-A 練習メニュー
                practiceMenu() {
                    const ranges = [
                        {label: '1-10首', val: '1-10'}, {label: '11-20首', val: '11-20'},
                        {label: '21-30首', val: '21-30'}, {label: '31-40首', val: '31-40'},
                        {label: '41-50首', val: '41-50'}, {label: '51-60首', val: '51-60'},
                        {label: '61-70首', val: '61-70'}, {label: '71-80首', val: '71-80'},
                        {label: '81-90首', val: '81-90'}, {label: '91-100首', val: '91-100'},
                        {label: '全首(1-100)', val: '1-100'}
                    ];
                    
                    let rangeButtons = ranges.map((r, idx) => {
                        const isSelected = app.state.practiceRange === r.val;
                        const colSpan = idx === 10 ? 'col-span-2 sm:col-span-4' : 'col-span-1 sm:col-span-2';
                        return `
                            <button onclick="app.state.practiceRange = '${r.val}'; app.render();" class="${colSpan} py-2 px-1 text-xs sm:text-sm font-bold rounded ${isSelected ? 'bg-orange-600 text-white shadow-inner' : 'bg-orange-100 text-orange-800 hover:bg-orange-200'} transition-colors">
                                ${r.label}
                            </button>
                        `;
                    }).join('');

                    return `
                        <div class="flex-1 wagara-bg flex items-center justify-center p-4 sm:p-6 overflow-y-auto">
                            <div class="bg-white p-6 sm:p-8 rounded shadow text-center border-t-4 border-orange-600 max-w-md w-full">
                                <i class="fa-solid fa-scroll text-5xl text-orange-700 mb-4"></i>
                                <h2 class="text-2xl font-bold mb-6 font-serif tracking-widest">練習範囲の設定</h2>
                                <div class="mb-6 text-left">
                                    <label class="block text-sm font-bold text-stone-600 mb-3 font-sans">出題範囲</label>
                                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                                        ${rangeButtons}
                                    </div>
                                </div>
                                <button onclick="app.startPractice()" class="bg-orange-700 text-white px-8 py-3 rounded shadow hover:bg-orange-800 font-bold tracking-widest w-full transition-colors mt-2">練習開始</button>
                            </div>
                        </div>
                    `;
                },

                // ②-B 練習モード
                practice() {
                    const s = app.state.practice;
                    if(s.isFinished) {
                        return `
                            <div class="flex-1 bg-stone-50 flex items-center justify-center p-6">
                                <div class="max-w-md w-full text-center">
                                    <i class="fa-solid fa-medal text-6xl text-yellow-500 mb-4 drop-shadow"></i>
                                    <h2 class="text-3xl font-bold mb-2 font-serif tracking-widest">修練完了</h2>
                                    <p class="text-xl mb-8 font-bold text-stone-700 font-sans mt-4">正解数: <span class="text-4xl text-orange-600">${s.score}</span> / ${s.questions.length}問</p>
                                    <div class="flex gap-4 justify-center font-bold">
                                        <button onclick="app.startPractice()" class="bg-stone-800 text-white px-8 py-3 rounded shadow hover:bg-stone-700">もう一度</button>
                                        <button onclick="app.goTo('home')" class="bg-stone-300 text-stone-800 px-8 py-3 rounded shadow hover:bg-stone-400">ホーム</button>
                                    </div>
                                </div>
                            </div>`;
                    }

                    const q = s.questions[s.currentIndex];
                    return `
                        <div class="flex-1 wagara-bg flex flex-col p-4">
                            <div class="flex justify-between text-stone-600 font-bold mb-4 px-2 font-serif tracking-widest">
                                <span>第 ${s.currentIndex + 1} 問</span>
                                <span>正解: ${s.score}</span>
                            </div>
                            
                            <div class="bg-white p-6 md:p-10 rounded shadow-md text-center mb-6 relative min-h-[160px] flex flex-col justify-center border-t-4 border-stone-800">
                                <button onclick="playAudioSegment(${q.id}, 'kami')" class="absolute top-4 right-4 p-3 bg-stone-100 text-stone-600 rounded-full hover:bg-stone-200 shadow-sm transition-colors" title="もう一度聞く">
                                    <i class="fa-solid fa-volume-high"></i>
                                </button>
                                <p class="text-xs text-stone-400 mb-2 font-sans font-bold tracking-widest">上の句</p>
                                <p class="text-2xl md:text-3xl font-serif text-stone-800 tracking-widest leading-[2]">
                                    ${formatRuby(q.kami)}
                                </p>
                                
                                ${s.selectedAnswer !== null ? `
                                    <div class="absolute inset-0 flex items-center justify-center bg-white/95 backdrop-blur-sm z-10 animate-pop">
                                        ${s.isCorrect ? `
                                            <div class="text-red-600 text-center"><i class="fa-regular fa-circle text-8xl"></i><div class="text-2xl font-bold mt-2 font-serif tracking-widest">正解！</div></div>
                                        ` : `
                                            <div class="text-blue-600 text-center"><i class="fa-solid fa-xmark text-7xl"></i><div class="text-2xl font-bold mt-2 font-serif tracking-widest">残念...</div>
                                            <div class="text-stone-800 mt-4 text-sm font-serif bg-stone-100 p-2 rounded">正解：${formatRuby(q.shimo)}</div></div>
                                        `}
                                    </div>
                                ` : ''}
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1">
                                ${q.options.map((opt, idx) => {
                                    let btnClass = "bg-white border-2 border-stone-300 text-stone-800 p-4 md:p-6 rounded text-lg font-serif hover:border-stone-800 transition-all text-left shadow-sm flex items-center gap-4";
                                    if(s.selectedAnswer !== null) {
                                        if(opt === q.shimo) btnClass = "bg-red-50 border-2 border-red-600 text-red-800 p-4 md:p-6 rounded text-lg font-serif text-left shadow-sm flex items-center gap-4";
                                        else if(opt === s.selectedAnswer && !s.isCorrect) btnClass = "bg-stone-200 border-2 border-stone-400 text-stone-500 p-4 md:p-6 rounded text-lg font-serif text-left opacity-50 flex items-center gap-4";
                                        else btnClass = "bg-white border-2 border-stone-200 text-stone-400 p-4 md:p-6 rounded text-lg font-serif text-left opacity-50 flex items-center gap-4";
                                    }
                                    return `
                                        <button onclick="app.actionPractice('${opt}')" ${s.selectedAnswer !== null ? 'disabled' : ''} class="${btnClass} active:scale-95">
                                            <span class="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center text-sm font-sans text-stone-500 flex-shrink-0">${idx+1}</span>
                                            <span class="leading-relaxed tracking-widest">${formatRuby(opt)}</span>
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                },

                // ③ 対戦メニュー
                battleMenu() {
                    const cpuRecords = app.state.stats.cpuRecords;
                    let cpuOptionsHTML = CPU_LEVELS.map(l => `
                        <button onclick="app.startBattleCpu(${l.level})" class="w-full bg-stone-50 border border-stone-200 hover:border-red-500 hover:bg-red-50 p-3 rounded flex justify-between items-center group transition-colors">
                            <span class="font-bold text-stone-700 group-hover:text-red-700 font-serif tracking-widest">Lv.${l.level} ${l.name}</span>
                            <span class="text-xs text-stone-500 bg-white px-2 py-1 rounded shadow-sm font-sans font-bold">勝 ${cpuRecords[l.level].w} / 負 ${cpuRecords[l.level].l}</span>
                        </button>
                    `).join('');

                    return `
                        <div class="flex-1 wagara-bg p-6 overflow-y-auto">
                            <div class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto mt-4">
                                <!-- CPU戦 -->
                                <div class="bg-white p-6 rounded shadow border-t-4 border-stone-800">
                                    <div class="flex items-center gap-4 mb-4">
                                        <div class="bg-stone-800 text-white p-3 rounded"><i class="fa-solid fa-user-ninja text-xl"></i></div>
                                        <h3 class="text-xl font-bold font-serif tracking-widest">CPU対戦</h3>
                                    </div>
                                    <p class="text-xs text-stone-500 mb-6 font-bold">難易度ごとに戦績が記録されます。</p>
                                    <div class="space-y-3 mb-2">
                                        ${cpuOptionsHTML}
                                    </div>
                                </div>
                                <!-- 2人対戦 -->
                                <div class="bg-white p-6 rounded shadow border-t-4 border-red-800 h-fit">
                                    <div class="flex items-center gap-4 mb-4">
                                        <div class="bg-red-800 text-white p-3 rounded"><i class="fa-solid fa-user-group text-xl"></i></div>
                                        <h3 class="text-xl font-bold font-serif tracking-widest">二人対戦</h3>
                                    </div>
                                    <p class="text-sm text-stone-600 mb-6 leading-relaxed">端末を机に置き、向かい合って対戦します。<br>両者お手つきで正解の札が光ります。</p>
                                    <button onclick="app.startBattleLocal()" class="w-full bg-red-800 text-white py-4 rounded font-bold hover:bg-red-900 shadow transition-colors flex justify-center items-center gap-3 tracking-widest font-serif">
                                        <i class="fa-solid fa-fan"></i> 対戦開始
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                },

                // ④ CPU対戦
                battleCpu() {
                    const s = app.state.battleCpu;
                    if(s.gameState === 'finished') {
                        const isWin = s.scoreP >= s.scoreC;
                        return `
                            <div class="flex-1 bg-stone-900 text-[#d1cfa9] flex flex-col items-center justify-center p-6 text-center">
                                <i class="fa-solid fa-fan text-7xl ${isWin ? 'text-red-500' : 'text-stone-600'} mb-6"></i>
                                <h2 class="text-4xl font-bold mb-8 font-serif tracking-widest">${isWin ? '見事、勝利！' : '無念、敗北...'}</h2>
                                <div class="flex gap-16 text-2xl mb-12 font-serif font-bold">
                                    <div><p class="text-stone-400 text-sm mb-2 font-sans">あなた</p><p class="text-white text-5xl">${s.scoreP}<span class="text-xl ml-1">枚</span></p></div>
                                    <div><p class="text-stone-400 text-sm mb-2 font-sans">CPU (Lv.${s.level})</p><p class="text-red-500 text-5xl">${s.scoreC}<span class="text-xl ml-1">枚</span></p></div>
                                </div>
                                <div class="flex gap-4 font-bold font-sans">
                                    <button onclick="app.startBattleCpu(${s.level})" class="bg-stone-700 text-white px-8 py-3 rounded shadow hover:bg-stone-600">再戦</button>
                                    <button onclick="app.goTo('battleMenu')" class="bg-stone-300 text-stone-800 px-8 py-3 rounded shadow hover:bg-stone-400">退陣</button>
                                </div>
                            </div>
                        `;
                    }

                    const boardHTML = s.board.map(card => {
                        const hand = s.hands.find(h => h.cardId === card.id);
                        let extraClass = "";
                        let handHTML = "";
                        if(hand) {
                            const rotateClass = hand.player === 'cpu' ? 'rotate-180' : '';
                            if(hand.isCorrect) {
                                extraClass = "ring-4 ring-green-500 animate-vanish z-20";
                                handHTML = `<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                                <i class="fa-solid fa-hand text-5xl text-green-500 drop-shadow-lg ${rotateClass}"></i>
                                            </div>`;
                            } else {
                                extraClass = "ring-4 ring-red-500 animate-shake z-10";
                                handHTML = `<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                                <i class="fa-solid fa-hand text-5xl text-red-500 drop-shadow-lg ${rotateClass}"></i>
                                            </div>`;
                            }
                        }
                        return `
                            <button onclick="app.actionBattleCpu(${card.id})" ${s.gameState !== 'playing' ? 'disabled' : ''} class="karuta-card w-[4.5rem] h-[6.5rem] sm:w-24 sm:h-36 flex items-center justify-center p-1 sm:p-2 relative bg-white ${extraClass}">
                                <p class="vertical-rl font-serif text-sm sm:text-lg text-stone-800 leading-loose tracking-[0.2em]">${formatRuby(card.shimo)}</p>
                                ${handHTML}
                            </button>
                        `;
                    }).join('');

                    return `
                        <div class="flex-1 flex flex-col bg-stone-900 select-none">
                            <div class="bg-stone-950 text-white p-3 flex justify-between items-center z-10 shadow-lg border-b border-stone-700">
                                <button onclick="app.goTo('battleMenu')" class="text-stone-400 p-2 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
                                <div class="font-bold flex gap-6 text-sm sm:text-base font-serif tracking-widest">
                                    <span class="text-white">あなた: ${s.scoreP}</span><span class="text-red-500">CPU(Lv.${s.level}): ${s.scoreC}</span>
                                </div>
                            </div>
                            
                            <!-- 中央部分をスリムに -->
                            <div class="bg-stone-800 p-2 sm:p-4 text-center min-h-[80px] flex flex-col justify-center shadow-lg relative z-10">
                                ${s.gameState === 'ready' ? 
                                    `<button onclick="app.nextRoundCpu()" class="bg-red-800 text-white px-8 py-2 rounded font-bold font-serif tracking-widest text-base sm:text-lg animate-pulse mx-auto shadow-lg hover:bg-red-700">試合開始</button>` : 
                                    `<div>
                                        <p class="text-[9px] sm:text-[10px] text-stone-400 mb-1 tracking-widest leading-none"><i class="fa-solid fa-volume-high"></i> 残り${s.deck.length + 1}首</p>
                                        <p class="text-base sm:text-xl font-serif text-white tracking-widest leading-relaxed">${formatRuby(s.currentPoem?.kami)}</p>
                                    </div>`
                                }
                            </div>
                            <div class="bg-[#d1cfa9] text-stone-800 text-center py-1 font-bold shadow-inner text-[10px] sm:text-xs tracking-widest font-serif border-y-2 border-stone-700">${s.message}</div>
                            
                            <div class="flex-1 tatami-bg p-2 sm:p-4 relative overflow-auto">
                                <div class="max-w-4xl mx-auto flex flex-wrap justify-center content-start gap-2 sm:gap-4 h-full pt-4 pb-12">
                                    ${boardHTML}
                                </div>
                            </div>
                        </div>
                    `;
                },

                // ⑤ ローカル2人対戦
                battleLocal() {
                    const s = app.state.battleLocal;
                    if(s.gameState === 'finished') {
                        const winner = s.scoreP1 > s.scoreP2 ? '下側の勝利' : s.scoreP1 < s.scoreP2 ? '上側の勝利' : '引き分け';
                        return `
                            <div class="flex-1 bg-stone-900 text-[#d1cfa9] flex flex-col items-center justify-center p-6 text-center">
                                <i class="fa-solid fa-fan text-7xl text-red-500 mb-6"></i>
                                <h2 class="text-4xl font-bold mb-8 font-serif tracking-widest">${winner}！</h2>
                                <div class="flex gap-16 text-2xl mb-12 font-serif font-bold">
                                    <div><p class="text-stone-400 text-sm mb-2 font-sans">下側 (P1)</p><p class="text-white text-5xl">${s.scoreP1}<span class="text-xl ml-1">枚</span></p></div>
                                    <div><p class="text-stone-400 text-sm mb-2 font-sans">上側 (P2)</p><p class="text-white text-5xl">${s.scoreP2}<span class="text-xl ml-1">枚</span></p></div>
                                </div>
                                <div class="flex gap-4 font-bold font-sans">
                                    <button onclick="app.startBattleLocal()" class="bg-stone-700 text-white px-8 py-3 rounded shadow hover:bg-stone-600">再戦</button>
                                    <button onclick="app.goTo('battleMenu')" class="bg-stone-300 text-stone-800 px-8 py-3 rounded shadow hover:bg-stone-400">退陣</button>
                                </div>
                            </div>
                        `;
                    }

                    const renderPlayerArea = (pNum) => {
                        return s.board.map(card => {
                            const isHighlight = s.highlightId === card.id;
                            const hand = s.hands.find(h => h.cardId === card.id && h.player === `p${pNum}`);
                            
                            // 両者不正解の際の緑色強調（背景も緑がかるように）
                            let extraClass = isHighlight ? "ring-4 ring-green-500 bg-green-100 scale-110 z-40 transition-transform shadow-2xl" : "";
                            let textClass = isHighlight ? "text-green-800 font-bold" : "text-stone-800";
                            let handHTML = "";
                            
                            if(hand) {
                                if(hand.isCorrect) {
                                    extraClass += " ring-4 ring-green-500 animate-vanish z-30";
                                    handHTML = `<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                                    <i class="fa-solid fa-hand text-4xl sm:text-5xl text-green-500 drop-shadow-lg"></i>
                                                </div>`;
                                } else {
                                    extraClass += " ring-4 ring-red-500 animate-shake z-30";
                                    handHTML = `<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                                                    <i class="fa-solid fa-hand text-4xl sm:text-5xl text-red-500 drop-shadow-lg"></i>
                                                </div>`;
                                }
                            }

                            return `
                                <button onclick="app.actionBattleLocal(${pNum}, ${card.id})" ${s.gameState !== 'playing' ? 'disabled' : ''} 
                                    class="karuta-card w-[4rem] h-[6rem] sm:w-20 sm:h-32 flex items-center justify-center p-1 relative bg-white ${extraClass}">
                                    <p class="vertical-rl font-serif text-[13px] sm:text-base ${textClass} leading-loose tracking-[0.2em]">${formatRuby(card.shimo)}</p>
                                    ${handHTML}
                                </button>
                            `;
                        }).join('');
                    };

                    return `
                        <div class="h-full flex flex-col font-serif select-none bg-stone-900 overflow-hidden">
                            <!-- Player 2 (上・逆さ) -->
                            <div class="flex-1 tatami-bg p-2 relative flex flex-wrap justify-center content-center gap-1 sm:gap-2 shadow-inner rotate-180 overflow-hidden">
                                <div class="absolute top-2 right-4 text-stone-600 font-bold bg-white/80 px-3 py-1 rounded shadow-sm z-10 font-sans text-xs tracking-widest border border-stone-300">P2: ${s.scoreP2} 枚</div>
                                ${renderPlayerArea(2)}
                            </div>

                            <!-- 中央コントローラー (ご要望通り、縦幅を極力狭くスリムに) -->
                            <div class="h-16 sm:h-20 bg-stone-950 border-y-2 border-stone-700 flex flex-col items-center justify-center text-white relative z-20 shadow-xl px-4 py-1">
                                <button onclick="app.goTo('battleMenu')" class="absolute left-4 top-1/2 -translate-y-1/2 text-stone-500 hover:text-white p-2 transition-colors">
                                    <i class="fa-solid fa-xmark text-xl"></i>
                                </button>
                                <div class="text-center w-full max-w-lg">
                                    ${s.gameState === 'ready' ? 
                                        `<button onclick="app.nextRoundLocal()" class="bg-red-800 text-white px-6 py-1 rounded font-bold font-serif text-base tracking-widest animate-pulse shadow-lg hover:bg-red-700">試合開始</button>` :
                                        `<p class="text-stone-400 text-[9px] sm:text-[10px] font-sans font-bold tracking-widest leading-none mb-1">${s.message}</p>
                                         <div class="text-sm sm:text-lg tracking-widest leading-none">${formatRuby(s.currentPoem?.kami)}</div>`
                                    }
                                </div>
                            </div>

                            <!-- Player 1 (下) -->
                            <div class="flex-1 tatami-bg p-2 relative flex flex-wrap justify-center content-center gap-1 sm:gap-2 shadow-inner overflow-hidden">
                                <div class="absolute top-2 right-4 text-stone-600 font-bold bg-white/80 px-3 py-1 rounded shadow-sm z-10 font-sans text-xs tracking-widest border border-stone-300">P1: ${s.scoreP1} 枚</div>
                                ${renderPlayerArea(1)}
                            </div>
                        </div>
                    `;
                }
            },

            // ==========================================
            // アクション・ロジック
            // ==========================================
            
            // 覚えるモード
            startLearn() {
                this.state.learn = { flippedCards: new Set() };
                this.goTo('learn');
            },
            toggleLearnFlip(id) {
                if(this.state.learn.flippedCards.has(id)) {
                    this.state.learn.flippedCards.delete(id);
                } else {
                    this.state.learn.flippedCards.add(id);
                }
                this.render(true); // ★ trueを渡してスクロール位置を保持
            },
            toggleMemorized(id) {
                const s = this.state.stats;
                if(s.memorized.includes(id)) {
                    s.memorized = s.memorized.filter(i => i !== id);
                } else {
                    s.memorized.push(id);
                }
                this.saveStats();
                this.state.learn.flippedCards.delete(id);
                this.render(true); // ★ trueを渡してスクロール位置を保持
            },
            
            // ★ 覚えるモードから直で練習モードへ
            startPracticeFromLearn() {
                this.state.practiceRange = this.state.learnRange;
                this.startPractice();
            },

            // 練習モード
            startPractice() {
                const [min, max] = this.state.practiceRange.split('-').map(Number);
                const filteredPoems = POEMS.filter(p => p.id >= min && p.id <= max);
                
                const shuffled = [...filteredPoems].sort(() => 0.5 - Math.random());
                const questionCount = Math.min(5, shuffled.length);
                const selected = shuffled.slice(0, questionCount); 

                const qs = selected.map(poem => {
                    let wrongPool = filteredPoems.filter(p => p.id !== poem.id);
                    if (wrongPool.length < 3) {
                        wrongPool = POEMS.filter(p => p.id !== poem.id);
                    }
                    const wrong = wrongPool.sort(() => 0.5 - Math.random()).slice(0, 3).map(p => p.shimo);
                    const options = [poem.shimo, ...wrong].sort(() => 0.5 - Math.random());
                    return { ...poem, options };
                });
                
                this.state.practice = { questions: qs, currentIndex: 0, score: 0, selectedAnswer: null, isCorrect: null, isFinished: false };
                this.goTo('practice');
                
                setTimeout(() => playAudioSegment(qs[0].id, 'kami'), 500);
            },
            actionPractice(option) {
                const s = this.state.practice;
                if(s.selectedAnswer !== null) return;
                
                s.selectedAnswer = option;
                s.isCorrect = (option === s.questions[s.currentIndex].shimo);
                if(s.isCorrect) s.score++;

                playAudioSegment(s.questions[s.currentIndex].id, 'shimo');
                this.render();

                setTimeout(() => {
                    if(s.currentIndex + 1 < s.questions.length) {
                        s.currentIndex++;
                        s.selectedAnswer = null;
                        s.isCorrect = null;
                        this.render();
                        playAudioSegment(s.questions[s.currentIndex].id, 'kami');
                    } else {
                        s.isFinished = true;
                        this.state.stats.practiceScores += s.score;
                        this.state.stats.playCount++;
                        this.saveStats();
                        this.render();
                    }
                // ★ 読み上げ完了を待つため、遷移時間を長めに設定
                }, 6000); 
            },

            // CPU対戦モード
            startBattleCpu(level) {
                const shuffled = [...POEMS].sort(() => 0.5 - Math.random());
                const matchDeck = shuffled.slice(0, 20);
                const boardCards = [...matchDeck].sort(() => 0.5 - Math.random());
                
                this.state.battleCpu = { gameState: 'ready', level: level, deck: matchDeck, board: boardCards, currentPoem: null, scoreP: 0, scoreC: 0, message: '開始ボタンを押してください', hands: [], playerMissed: false };
                this.goTo('battleCpu');
            },
            nextRoundCpu() {
                const s = this.state.battleCpu;
                if(s.deck.length === 0) {
                    s.gameState = 'finished';
                    if(s.scoreP >= s.scoreC) this.state.stats.cpuRecords[s.level].w++;
                    else this.state.stats.cpuRecords[s.level].l++;
                    this.saveStats();
                    this.render();
                    return;
                }
                s.hands = [];
                s.playerMissed = false; 
                s.currentPoem = s.deck.shift();
                s.gameState = 'playing';
                s.message = '詠み上げ中...';
                this.render();
                
                playAudioSegment(s.currentPoem.id, 'kami');

                const levelData = CPU_LEVELS.find(l => l.level === s.level);
                const reactionTime = Math.floor(Math.random() * (levelData.speedMax - levelData.speedMin)) + levelData.speedMin;
                
                this.cpuTimer = setTimeout(() => {
                    this.actionCpuTakes();
                }, reactionTime);
            },
            actionBattleCpu(cardId) {
                const s = this.state.battleCpu;
                if(s.gameState !== 'playing') return;
                
                if(s.playerMissed) return;
                
                const isCorrect = cardId === s.currentPoem.id;
                s.hands.push({ cardId: cardId, isCorrect: isCorrect, player: 'p1' });

                if(isCorrect) {
                    clearTimeout(this.cpuTimer);
                    s.scoreP++;
                    s.message = '見事！あなたが取りました。';
                    s.gameState = 'round_end';
                    this.render(); 
                    
                    playAudioSegment(s.currentPoem.id, 'shimo');
                    
                    // ★ 読み上げ完了を待つため、遷移時間を長めに設定
                    setTimeout(() => {
                        s.board = s.board.filter(c => c.id !== cardId);
                        this.nextRoundCpu();
                    }, 6000); 
                } else {
                    s.playerMissed = true; 
                    s.message = 'お手つき！CPUの動きを待ちます...';
                    this.render(); 
                    
                    setTimeout(() => {
                        s.hands = s.hands.filter(h => h.cardId !== cardId);
                        this.render();
                    }, 500);
                }
            },
            actionCpuTakes() {
                const s = this.state.battleCpu;
                s.scoreC++;
                s.message = 'CPUに取られました！';
                s.gameState = 'round_end';
                s.hands.push({ cardId: s.currentPoem.id, isCorrect: true, player: 'cpu' });
                this.render();

                playAudioSegment(s.currentPoem.id, 'shimo');

                // ★ 読み上げ完了を待つため、遷移時間を長めに設定
                setTimeout(() => {
                    s.board = s.board.filter(c => c.id !== s.currentPoem.id);
                    this.nextRoundCpu();
                }, 6000); 
            },

            // 2人対戦（ローカル）モード
            startBattleLocal() {
                const shuffled = [...POEMS].sort(() => 0.5 - Math.random());
                const matchDeck = shuffled.slice(0, 20); 
                const boardCards = [...matchDeck].sort(() => 0.5 - Math.random());
                
                this.state.battleLocal = { gameState: 'ready', deck: matchDeck, board: boardCards, currentPoem: null, scoreP1: 0, scoreP2: 0, message: '中央の開始ボタンを押してください', hands: [], p1Missed: false, p2Missed: false, highlightId: null };
                this.goTo('battleLocal');
            },
            nextRoundLocal() {
                const s = this.state.battleLocal;
                if(s.deck.length === 0) {
                    s.gameState = 'finished';
                    this.render();
                    return;
                }
                s.hands = [];
                s.p1Missed = false;
                s.p2Missed = false;
                s.highlightId = null;
                s.currentPoem = s.deck.shift();
                s.gameState = 'playing';
                s.message = '詠み上げ中...';
                this.render();
                
                playAudioSegment(s.currentPoem.id, 'kami');
            },
            actionBattleLocal(pNum, cardId) {
                const s = this.state.battleLocal;
                if(s.gameState !== 'playing') return;
                if((pNum === 1 && s.p1Missed) || (pNum === 2 && s.p2Missed)) return;

                const isCorrect = cardId === s.currentPoem.id;
                s.hands.push({ cardId: cardId, isCorrect: isCorrect, player: `p${pNum}` });

                if(isCorrect) {
                    if(pNum === 1) { s.scoreP1++; s.message = "P1 (下側) が取りました！"; }
                    else { s.scoreP2++; s.message = "P2 (上側) が取りました！"; }
                    
                    s.gameState = 'round_end';
                    this.render();

                    playAudioSegment(s.currentPoem.id, 'shimo');

                    // ★ 読み上げ完了を待つため、遷移時間を長めに設定
                    setTimeout(() => {
                        s.board = s.board.filter(c => c.id !== cardId);
                        this.nextRoundLocal();
                    }, 6000);

                } else {
                    if(pNum === 1) s.p1Missed = true;
                    if(pNum === 2) s.p2Missed = true;
                    s.message = `Player ${pNum} がお手つき！`;
                    this.render();

                    setTimeout(() => {
                        s.hands = s.hands.filter(h => !(h.cardId === cardId && h.player === `p${pNum}`));
                        
                        if(s.p1Missed && s.p2Missed) {
                            s.gameState = 'round_end';
                            s.message = "両者お手つき！正解はこちら";
                            s.highlightId = s.currentPoem.id;
                            this.render();
                            
                            playAudioSegment(s.currentPoem.id, 'shimo');
                            
                            // ★ 読み上げ完了を待つため、遷移時間を長めに設定
                            setTimeout(() => {
                                s.board = s.board.filter(c => c.id !== s.currentPoem.id);
                                this.nextRoundLocal();
                            }, 6000); 
                        } else {
                            this.render();
                        }
                    }, 500);
                }
            }
        };

        // アプリ起動
        window.onload = () => { app.init(); };

    </script>
